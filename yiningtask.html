<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小公主的今日任务看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .completed { opacity: 0.6; transform: scale(0.98); }
        .glass-effect { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-12">
        
        <!-- 顶部状态与今日统计 -->
        <header class="sticky top-0 z-10 glass-effect border-b border-pink-100">
            <div class="p-6 pb-3 flex justify-between items-end">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">你好, 宝贝! ✨</h1>
                    <p class="text-sm text-gray-500">{{ todayDateStr }}</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-bold text-pink-500">
                        {{ completedCount }}<span class="text-gray-400 text-sm">/{{ tasks.length }}</span>
                    </p>
                    <p class="text-xs text-gray-400">今日已完成</p>
                </div>
            </div>
            
            <!-- 进度条 -->
            <div class="px-6 pb-5">
                <div class="w-full bg-gray-200 rounded-full h-2.5 mb-1">
                    <div class="bg-gradient-to-r from-pink-400 to-purple-500 h-2.5 rounded-full transition-all duration-500" 
                         :style="{ width: progress + '%' }"></div>
                </div>
                <div class="flex justify-between text-[10px] text-gray-400 font-medium px-1">
                    <span>今日进度: {{ progress }}%</span>
                    <span v-if="progress === 100" class="text-green-500 font-bold">今日满分! 🏅</span>
                    <span v-else>加油! 🎯</span>
                </div>
            </div>
        </header>

        <!-- 任务列表 -->
        <main class="p-4 space-y-4">
            <div v-if="tasks.length === 0" class="text-center py-12 text-gray-400 text-sm">
                今天没有安排任务哦~ ☕
            </div>
            
            <div v-for="task in tasks" :key="task.id" 
                 @click="toggleTask(task)"
                 :class="['task-card bg-white p-4 rounded-2xl shadow-sm border-2 flex items-center justify-between', 
                          task.completed ? 'border-green-200 completed' : 'border-white active:scale-95']">
                <div class="flex items-center space-x-4">
                    <div class="text-3xl">{{ task.icon }}</div>
                    <div>
                        <h3 class="font-bold text-gray-700 text-base" :class="{'line-through text-gray-400': task.completed}">{{ task.name }}</h3>
                        <p class="text-xs text-gray-400">{{ task.time }}</p>
                    </div>
                </div>
                <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors shrink-0"
                     :class="task.completed ? 'bg-green-500 border-green-500' : 'border-gray-200'">
                    <svg v-if="task.completed" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
        </main>

    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                // 1. 获取今天到底是周几 (0是周日，1-6是周一到周六)
                const localDay = new Date().getDay();

                // 2. 纯粹的每日静态模版（完全不依赖复杂的本地跨周缓存比对）
                const weeklyTemplate = {
                    1: [ // 周一
                        { id: '1-1', name: '练习钢琴 15 分钟', time: '每日必做', icon: '🎹', completed: false },
                        { id: '1-2', name: '练习小号 15 分钟', time: '每日必做', icon: '🎺', completed: false },
                        { id: '1-3', name: '中文阅读', time: '每日必做', icon: '📖', completed: false },
                        { id: '1-4', name: '叫叫学习', time: '周一至周五', icon: '🐥', completed: false },
                        { id: '1-5', name: '完成学校作业', time: '非假期上学日', icon: '📝', completed: false },
                        { id: '1-6', name: '收拾书包和书桌', time: '非假期上学日', icon: '🎒', completed: false },
                        { id: '1-7', name: '中文课阅读作业', time: '周一特有', icon: '📚', completed: false }
                    ],
                    2: [ // 周二
                        { id: '2-1', name: '练习钢琴 15 分钟', time: '每日必做', icon: '🎹', completed: false },
                        { id: '2-2', name: '练习小号 15 分钟', time: '每日必做', icon: '🎺', completed: false },
                        { id: '2-3', name: '中文阅读', time: '每日必做', icon: '📖', completed: false },
                        { id: '2-4', name: '叫叫学习', time: '周一至周五', icon: '🐥', completed: false },
                        { id: '2-5', name: '完成学校作业', time: '非假期上学日', icon: '📝', completed: false },
                        { id: '2-6', name: '收拾书包和书桌', time: '非假期上学日', icon: '🎒', completed: false },
                        { id: '2-7', name: '中文数学五道题', time: '周二特有', icon: '🔢', completed: false }
                    ],
                    3: [ // 周三
                        { id: '3-1', name: '练习钢琴 15 分钟', time: '每日必做', icon: '🎹', completed: false },
                        { id: '3-2', name: '练习小号 15 分钟', time: '每日必做', icon: '🎺', completed: false },
                        { id: '3-3', name: '中文阅读', time: '每日必做', icon: '📖', completed: false },
                        { id: '3-4', name: '叫叫学习', time: '周一至周五', icon: '🐥', completed: false },
                        { id: '3-5', name: '完成学校作业', time: '非假期上学日', icon: '📝', completed: false },
                        { id: '3-6', name: '收拾书包和书桌', time: '非假期上学日', icon: '🎒', completed: false },
                        { id: '3-7', name: '中文课听写作业', time: '周三特有', icon: '✍️', completed: false }
                    ],
                    4: [ // 周四
                        { id: '4-1', name: '练习钢琴 15 分钟', time: '每日必做', icon: '🎹', completed: false },
                        { id: '4-2', name: '练习小号 15 分钟', time: '每日必做', icon: '🎺', completed: false },
                        { id: '4-3', name: '中文阅读', time: '每日必做', icon: '📖', completed: false },
                        { id: '4-4', name: '叫叫学习', time: '周一至周五', icon: '🐥', completed: false },
                        { id: '4-5', name: '完成学校作业', time: '非假期上学日', icon: '📝', completed: false },
                        { id: '4-6', name: '收拾书包和书桌', time: '非假期上学日', icon: '🎒', completed: false }
                    ],
                    5: [ // 周五
                        { id: '5-1', name: '练习钢琴 15 分钟', time: '每日必做', icon: '🎹', completed: false },
                        { id: '5-2', name: '练习小号 15 分钟', time: '每日必做', icon: '🎺', completed: false },
                        { id: '5-3', name: '中文阅读', time: '每日必做', icon: '📖', completed: false },
                        { id: '5-4', name: '叫叫学习', time: '周一至周五', icon: '🐥', completed: false }
                    ],
                    6: [ // 周六
                        { id: '6-1', name: '练习钢琴 15 分钟', time: '每日必做', icon: '🎹', completed: false },
                        { id: '6-2', name: '练习小号 15 分钟', time: '每日必做', icon: '🎺', completed: false },
                        { id: '6-3', name: '中文阅读', time: '每日必做', icon: '📖', completed: false },
                        { id: '6-4', name: '奇奇学英语', time: '周末任务', icon: '🦖', completed: false }
                    ],
                    0: [ // 周日
                        { id: '7-1', name: '练习钢琴 15 分钟', time: '每日必做', icon: '🎹', completed: false },
                        { id: '7-2', name: '练习小号 15 分钟', time: '每日必做', icon: '🎺', completed: false },
                        { id: '7-3', name: '中文阅读', time: '每日必做', icon: '📖', completed: false },
                        { id: '7-4', name: '奇奇学英语', time: '周末任务', icon: '🦖', completed: false },
                        { id: '7-5', name: '收拾书包和书桌', time: '准备开学', icon: '🎒', completed: false }
                    ]
                };

                // 3. 响应式任务数据（根据今天 localDay 实时提取，并附带当天的持久化Key）
                const tasks = ref([]);
                const storageKey = `daughter_task_day_${localDay}`;

                // 4. 初始化加载：只读取今天这一天的数据
                const initData = () => {
                    const saved = localStorage.getItem(storageKey);
                    if (saved) {
                        tasks.value = JSON.parse(saved);
                    } else {
                        // 如果今天第一次打开，直接载入今天对应的模板
                        tasks.value = weeklyTemplate[localDay] || [];
                    }
                };

                initData();

                // 5. 今日数据统计
                const completedCount = computed(() => tasks.value.filter(t => t.completed).length);
                const progress = computed(() => {
                    if (tasks.value.length === 0) return 0;
                    return Math.round((completedCount.value / tasks.value.length) * 100);
                });

                const todayDateStr = new Date().toLocaleDateString('zh-CN', { 
                    month: 'long', day: 'numeric', weekday: 'long' 
                });

                // 6. 点击打卡交互
                const toggleTask = (task) => {
                    task.completed = !task.completed;
                    
                    // 保存打卡状态到当前这一天的缓存
                    localStorage.setItem(storageKey, JSON.stringify(tasks.value));

                    if (task.completed) {
                        confetti({
                            particleCount: 120,
                            spread: 60,
                            origin: { y: 0.8 },
                            colors: ['#FF69B4', '#9333EA', '#3B82F6']
                        });
                    }
                };

                return { tasks, completedCount, progress, todayDateStr, toggleTask };
            }
        }).mount('#app');
    </script>
</body>
</html>
